spring.application.name=y9_gaming_site
# Use Docker environment variables with local fallbacks
spring.datasource.url=jdbc:mysql://localhost:3307/y9
spring.datasource.username=root
spring.datasource.password=rootsecret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings to automatically generate your OOP tables
spring.jpa.hibernate.ddl-auto=update
server.port=8081
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
