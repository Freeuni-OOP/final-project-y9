<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet"  th:href="@{/css/navbar.css}">
    <link rel="stylesheet" href="/css/Chat.css" />
</head>
<body>
<nav class="navbar">
    <a class="navbar__brand" href="/home">Y9</a>
    <ul class="navbar__links">
        <li><a href="/home">Home</a></li>
        <li><a href="/quizzes" class="active">Quizzes</a></li>
        <li><a href="/leaderboard">Leaderboard</a></li>
        <li><a href="/chat">Chat</a></li>
        <li id="adminLink" style="display: none;">
            <a th:href="@{/admin/dashboard}">Admin Panel</a>
        </li>
    </ul>
    <div class="navbar__user">
        <img id="nav-avatar"
             class="navbar__avatar"
             src="/img/avatars/default.png"
             alt="avatar"
             style="cursor: pointer;"
             onclick="redirectToMyProfile()" />

        <span id="nav-username"
              class="navbar__username"
              style="cursor: pointer;"
              onclick="redirectToMyProfile()">...</span>

        <button onclick="logout()" class="navbar__logout">Log out</button>
    </div>
</nav>
    <div class="card">
        <h2>Chat with friend</h2>
        <p>you are logged in as: <strong id = "myUsernameLabel"></strong></p>
        <label>Friend's username</label>
        <input type="text" id="othersUsername">

        <button onclick="openFriendChat()">Open chat</button>
    </div>

    <div class="card">
        <h2>Create group chat</h2>
        <label>Group name</label>
        <input type="text" id="groupName">
        <label>Write friend's username, separated by commas.</label>
        <input type="text" id="groupUserNames">
        <button onclick="createGroup()">Create group</button>
    </div>

    <div class="card" id="chatBox">
        <h2>Room #<span id="roomIdLabel"></span></h2>
        <div id="messages"></div>
        <div class="sendRow">
            <input type="text" id="messageInput" placeholder="write message">
            <button onclick="sendMessage()">send</button>
        </div>
    </div>
    <script src="/js/Chat.js"></script>
    <script src="/js/navbar.js"></script>

    <script>
        async function redirectToMyProfile(){
            const token = localStorage.getItem('token');
            if(!token){
                window.location.href = "/login";
                return;
            }
            try {
                const res = await fetch("/api/users/me",{
                    method: "GET",
                    headers:{
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                }
                });
                if(res.ok){
                    const user = await res.json();
                    window.location.href = `/profile/${user.id}`;
                }else{
                    window.location.href = "/login";
                }
            }catch (err){
                console.error("Failed to route to profile view:", err);
                window.location.href = "/login";
            }
        }

        async function logout(){
            try{
                await fetch("/api/users/logout", {method: "POST"});
            }catch (e){
                console.error("Logout request skipped.")
            }
            localStorage.removeItem("token");
            localStorage.removeItem("role");
            localStorage.removeItem("username");
            window.location.href = "/login";
        }
    </script>

</body>
</html>
