<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Y9 - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">
    <link rel="stylesheet"  th:href="@{/css/navbar.css}">
    <link rel="stylesheet" href="/css/Chat.css" />
    <style>
        body {margin: 0; padding: 0;}
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar(active='chat')}"></nav>
<div th:replace="~{fragments/Notifications :: Notifications}"></div>

<div class="chat-layout">
    <div class="chat-sidebar">
        <div class="chat-panel chat-panel--friend">
            <h2>💬 Chat with friends</h2>
            <p class="my-username-label">You are logged in as: <strong id="myUsernameLabel">...</strong></p>


            <label>Friend's username</label>
            <div class="user-search-wrapper">
                <input type="text" id="othersUsername" autocomplete="off" oninput="onFriendSearch(this.value)">
                <div id="friendSearchResults" class="chat-search-results" style="display:none;"></div>
            </div>

            <button class="chat-btn" onclick="openFriendChat()">Open chat</button>
        </div>

        <div id="error-banner" style="display:none; margin-top:10px; font-size:14px;">
            <span id="error-text" style="color:#ff6b6b;"></span>
            <button onclick="hideError()" style="background:none; border:none; color:#ff6b6b; cursor:pointer; font-size:14px; margin-left:8px;">×</button>
        </div>

        <div class="chat-panel">
            <h2>👥 Create group chat</h2>


            <label>Group name</label>
            <input type="text" id="groupName" placeholder="Enter group name...">

            <label>Group Members</label>

            <div class="group-members-selection">
                <button type="button" class="chat-btn" style="margin-top: 0;" onclick="toggleFriendDropdown()">➕ Add Member</button>

                <div id="friendDropdown" class="chat-search-results" style="display:none; position: absolute; width: 100%;"></div>
            </div>

            <div id="selectedMembersGroup" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px"></div>

            <button class="chat-btn" style="margin-top: 20px;" onclick="createGroup()">Create group</button>
        </div>
    </div>


    <div class="chat-main" id="chatBox">
        <div class="chat-panel">
            <div class="chat-room-title">⚡ Room #<span id="roomIdLabel"></span></div>
            <div id="messages"></div>
            <div class="send-row">
                <input type="text" id="messageInput" placeholder="write message...">
                <button onclick="sendMessage()">Send -></button>
            </div>
        </div>
    </div>
</div>
<script src="/js/Chat.js"></script>
<script th:src="@{/js/navbar.js}"></script>
<script th:src="@{/js/streak.js}"></script>

<script>
    async function redirectToMyProfile(){
        const token = window.localStorage.getItem('token');
        if(!token){
            window.location.href = "/login";
            return;
        }
        try {
            const res = await fetch("/api/users/me",{
                method: "GET",
                headers:{
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });
            if(res.ok){
                const user = await res.json();
                window.location.href = `/profile/${user.id}`;
            }else{
                window.location.href = "/login";
            }
        }catch (err){
            console.error("Failed to route to profile view:", err);
            window.location.href = "/login";
        }
    }


    async function logout(){
        try{
            await fetch("/api/users/logout", {method: "POST"});
        }catch (e){
            console.error("Logout request skipped.")
        }
        window.localStorage.removeItem("token");
        window.localStorage.removeItem("role");
        window.localStorage.removeItem("username");
        window.location.href = "/login";
    }
</script>

<script src="/js/Notification.js"></script>
</body>
</html>
