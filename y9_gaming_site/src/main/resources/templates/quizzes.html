<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y9 — Quizzes</title>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            background-image: url('/img/backgrounds/final.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            height: 62px;
            background: rgba(186, 43, 124, 0.91);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgb(163, 42, 107);
            box-shadow: 0 10px 40px rgba(145, 60, 143, 0.78);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar__brand {
            font-family: 'Bitcount Grid Double Ink', monospace;
            color: rgba(140, 55, 156, 0.91);
            font-size: 26px;
            letter-spacing: 3px;
            text-decoration: none;
        }
        .navbar__links {
            display: flex;
            gap: 28px;
            list-style: none;
        }
        .navbar__links a {
            color: rgba(61, 19, 64, 0.89);
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .navbar__links a:hover, .navbar__links a.active {
            color: #fff;
            font-weight: bold;
        }
        .navbar__user { display: flex; align-items: center; gap: 10px; }
        .navbar__avatar {
            width: 34px; height: 34px; border-radius: 50%;
            border: 2px solid #b327c9; object-fit: cover;
        }
        .navbar__username { font-size: 13px; color: rgba(73, 30, 85, 0.87); }
        .navbar__logout {
            font-size: 12px; color: #ff6b9d; text-decoration: none;
            padding: 5px 12px; border: 1px solid rgba(255, 107, 157, 0.4);
            border-radius: 6px;
        }

        .container {
            padding: 30px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .hub-title {
            font-family: 'Bitcount Grid Double Ink', monospace;
            color: #e194d5;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 28px;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(71, 44, 82, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #9a4eab;
            border-color: #e765e0;
            box-shadow: 0 0 15px rgba(154, 78, 171, 0.5);
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
        }
        .quiz-card {
            background: rgba(71, 44, 82, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 22px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(8px);
        }
        .quiz-card:hover {
            transform: translateY(-5px);
            border-color: #e765e0;
            box-shadow: 0 10px 25px rgba(145, 60, 143, 0.4);
        }
        .quiz-icon { font-size: 40px; margin-bottom: 15px; }
        .quiz-title { font-size: 18px; margin-bottom: 8px; font-weight: 700; }
        .quiz-desc { font-size: 13px; color: #ccc; margin-bottom: 18px; line-height: 1.5; }
        .quiz-meta {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .play-btn {
            width: 100%; padding: 11px; background-color: #9a4eab;
            border: none; color: white; font-weight: bold;
            border-radius: 6px; cursor: pointer; font-size: 13px;
            transition: all 0.2s ease;
        }
        .play-btn:hover { background-color: #e194d5; color: #0f0f1a; }

        .hidden { display: none !important; }

        .mcq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .mcq-btn {
            background: rgba(71, 44, 82, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
            text-align: center;
        }
        .mcq-btn:hover {
            background: #00f0ff;
            color: #0f0f1a;
            border-color: #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar__brand" href="/home">Y9</a>
    <ul class="navbar__links">
        <li><a href="/home">Home</a></li>
        <li><a href="/quizzes" class="active">Quizzes</a></li>
        <li><a href="/leaderboard">Leaderboard</a></li>
        <li><a href="/chat">Chat</a></li>
        <li id="adminLink" style="display: none;">
            <a th:href="@{/admin/dashboard}">Admin Panel</a>
        </li>
    </ul>
    <div class="navbar__user">
        <img id="nav-avatar"
             class="navbar__avatar"
             src="/img/avatars/default.png"
             alt="avatar"
             style="cursor: pointer;"
             onclick="redirectToMyProfile()" />

        <span id="nav-username"
              class="navbar__username"
              style="cursor: pointer;"
              onclick="redirectToMyProfile()">...</span>

        <button onclick="logout()" class="navbar__logout">Log out</button>
    </div>
</nav>

<main class="container">
    <h1 class="hub-title">🧠 Knowledge Vault 🧠</h1>

    <div id="filterBar" class="filter-bar">
        <button class="filter-btn active" onclick="filterCategory(this, '')">All Topics</button>
        <button class="filter-btn" onclick="filterCategory(this, 'GEOGRAPHY')">Geography</button>
        <button class="filter-btn" onclick="filterCategory(this, 'SCIENCE')">Science</button>
        <button class="filter-btn" onclick="filterCategory(this, 'ENTERTAINMENT')">Entertainment</button>
    </div>

    <div id="quizGrid" class="quiz-grid">
        <p style="text-align: center; width: 100%;">Syncing quiz streams...</p>
    </div>

    <div id="quizPlayer" class="quiz-card hidden" style="max-width: 600px; margin: 30px auto; padding: 30px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="activeQuizTitle" style="color: #e194d5;">Quiz Title</h2>
            <div id="quizTimer" style="font-size: 24px; font-weight: bold; color: #ff007f; font-family: monospace;">00:00</div>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;" />

        <div id="gameActiveArea">
            <h3 id="questionPrompt" style="margin-bottom: 25px; font-size: 20px; min-height: 56px; line-height: 1.4;">Loading prompt...</h3>

            <div id="textInputContainer" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="answerInput" autocomplete="off" placeholder="Type your answer..."
                       onkeydown="handleKeyDown(event)"
                       style="flex: 1; padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
                              background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none; transition: border-color 0.2s;">

                <button class="play-btn" style="width: auto; padding: 0 25px; background: #00f0ff; color: #0f0f1a; box-shadow: 0 0 10px rgba(0,240,255,0.3);"
                        onclick="checkAnswer()">Submit</button>
            </div>

            <div id="mcqOptionsContainer" class="mcq-grid hidden">
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #aaa; margin-top: 20px;">
                <span id="questionProgress">Question 1 of X</span>
                <div style="display: flex; gap: 10px;">
                    <button id="skipBtn" class="play-btn" style="width: auto; padding: 6px 15px; background: #9a4eab;" onclick="skipQuestion()">Skip</button>
                    <button class="play-btn" style="width: auto; padding: 6px 15px; background: #5a2c5e;" onclick="quitQuiz()">Give Up</button>
                </div>
            </div>
        </div>

        <div id="gameScoreArea" class="hidden">
            <h3 style="color: #00f0ff; margin-bottom: 10px;">Quiz Complete!</h3>
            <p id="finalScoreText" style="font-size: 18px; margin-bottom: 20px;">You scored X out of Y</p>
            <button class="play-btn" onclick="exitPlayer()">Back to Quiz Vault</button>
        </div>
    </div>
</main>
<script src="/js/quizzes.js"></script>
<script>
    async function redirectToMyProfile() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = "/login";
            return;
        }

        try {
            const res = await fetch("/api/users/me", {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });

            if (res.ok) {
                const user = await res.json();
                window.location.href = `/profile/${user.id}`;
            } else {
                window.location.href = "/login";
            }
        } catch (err) {
            console.error("Failed to route to profile view:", err);
            window.location.href = "/login";
        }
    }

    async function logout() {
        try {
            await fetch("/api/users/logout", { method: "POST" });
        } catch (e) {
            console.error("Logout request skipped.");
        }
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        localStorage.removeItem("username");
        window.location.href = "/login";
    }
</script>
</body>
</html>
