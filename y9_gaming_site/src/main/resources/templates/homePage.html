
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Y9 — Home</title>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/navbar.css}">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            /*body {*/
            /*    font-family: 'Segoe UI', sans-serif;*/
            /*    color: #fff;*/
            /*    background: linear-gradient(135deg, #523b5c 0%, #523b5c 10%, #6a4b6a 70%, #5a2c5e 100%);*/
            /*    min-height: 100vh;*/
            /*}*/
            body {
                font-family: 'Segoe UI', sans-serif;
                color: #fff;
                background-image: url('/img/backgrounds/final.png');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                min-height: 100vh;
            }

            .hero {
                text-align: center;
                padding: 55px 20px 35px;
            }
            .hero__label {
                font-size: 12px;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: #cba8d8;
                margin-bottom: 10px;
            }
            .hero__number {
                font-family: 'Bitcount Grid Double Ink', monospace;
                font-size: 80px;
                color: #e194d5;
                line-height: 1;
            }
            .hero__sub {
                font-size: 12px;
                color: #aaa;
                margin-top: 10px;
                letter-spacing: 3px;
                text-transform: uppercase;
            }

            .games-container {
                padding: 30px 40px 10px;
                max-width: 1200px;
                margin: 0 auto;
            }
            .hub-title {
                font-family: 'Bitcount Grid Double Ink', monospace;
                color: #b327c9;
                text-align: center;
                margin-bottom: 28px;
                letter-spacing: 3px;
                text-transform: uppercase;
                font-size: 22px;
            }
            .game-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 22px;
            }
            .game-card {
                background: rgba(71, 44, 82, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                padding: 22px;
                text-align: center;
                color: white;
                transition: all 0.3s ease;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                backdrop-filter: blur(8px);
            }
            .game-card:hover {
                transform: translateY(-5px);
                border-color: #e765e0;
                box-shadow: 0 10px 25px rgba(145, 60, 143, 0.4);
            }
            .game-icon {
                width: 80px;
                height: 80px;
                object-fit: cover;
                border-radius: 12px;
                margin: 0 auto 15px auto;
                border: 2px solid rgba(255, 255, 255, 0.2);
            }
            .game-title {
                font-size: 18px;
                margin-bottom: 8px;
                font-weight: 700;
            }
            .game-desc {
                font-size: 13px;
                color: #ccc;
                margin-bottom: 18px;
                line-height: 1.5;
            }
            .game-badge {
                display: inline-block;
                font-size: 10px;
                padding: 4px 9px;
                border-radius: 4px;
                text-transform: uppercase;
                font-weight: bold;
                margin-bottom: 14px;
                letter-spacing: 0.5px;
            }
            .badge-source { background-color: #00f0ff; color: #0f0f1a; }
            .badge-home   { background-color: #ff007f; color: #fff; }
            .play-btn {
                width: 100%;
                padding: 11px;
                background-color: #9a4eab;
                border: none;
                color: white;
                font-weight: bold;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
                transition: background-color 0.2s;
            }
            .play-btn:hover { background-color: #e194d5; color: #0f0f1a; }

            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 22px;
                max-width: 1200px;
                margin: 28px auto 50px;
                padding: 0 40px;
            }
            .card {
                background: rgba(71, 44, 82, 0.6);
                backdrop-filter: blur(8px);
                border-radius: 16px;
                padding: 28px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 0 10px 40px rgba(145, 60, 143, 0.25);
            }
            .card__title {
                font-family: 'Bitcount Grid Double Ink', monospace;
                color: #d07fd8;
                font-size: 18px;
                margin-bottom: 20px;
                letter-spacing: 1px;
            }

            .leaderboard { list-style: none; }
            .leaderboard li {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 11px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                font-size: 14px;
            }
            .leaderboard li:last-child { border-bottom: none; }
            .leaderboard__rank {
                font-family: 'Bitcount Grid Double Ink', monospace;
                font-size: 22px;
                color: #b327c9;
                min-width: 28px;
            }
            .leaderboard__name { flex: 1; color: #e8e8e8; }
            .leaderboard__score { color: #e194d5; font-weight: bold; font-size: 13px; }
            .leaderboard__skeleton {
                height: 40px;
                background: rgba(179, 39, 201, 0.1);
                border-radius: 6px;
                margin-bottom: 8px;
                animation: pulse 1.5s infinite;
            }

            .achievements { list-style: none; }
            .achievements li {
                display: flex;
                align-items: flex-start;
                gap: 14px;
                padding: 11px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            }
            .achievements li:last-child { border-bottom: none; }
            .achievements__icon { font-size: 22px; min-width: 28px; text-align: center; }
            .achievements__name { color: #e8e8e8; font-weight: 600; font-size: 13px; margin-bottom: 3px; }
            .achievements__who  { font-size: 11px; color: #aaa; }
            .achievements__skeleton {
                height: 48px;
                background: rgba(179, 39, 201, 0.1);
                border-radius: 6px;
                margin-bottom: 8px;
                animation: pulse 1.5s infinite;
            }

            @keyframes pulse {
                0%, 100% { opacity: 0.5; }
                50%       { opacity: 1; }
            }

            .theater-overlay {
                position: fixed;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
                background-color: #0a0a12;
                z-index: 9999;
                display: flex;
                flex-direction: column;
            }
            .theater-header {
                background-color: rgba(71, 44, 82, 0.9);
                border-bottom: 2px solid #b327c9;
                padding: 15px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .theater-title {
                font-family: 'Bitcount Grid Double Ink', monospace;
                color: #e194d5;
                letter-spacing: 2px;
                font-size: 22px;
                margin: 0;
            }
            .close-theater-btn {
                padding: 8px 18px;
                background-color: #ff007f;
                color: white;
                border: none;
                border-radius: 6px;
                font-weight: bold;
                cursor: pointer;
                font-size: 14px;
                transition: background 0.2s;
            }
            .close-theater-btn:hover { background-color: #ff5599; }
            .theater-body {
                flex-grow: 1;
                width: 100%;
                height: calc(100vh - 65px);
                background-color: #000;
            }
            .theater-body iframe { width: 100%; height: 100%; border: none; }

            .hidden { display: none !important; }

            @media (max-width: 768px) {
                .grid { grid-template-columns: 1fr; padding: 0 20px; }
                .games-container { padding: 20px 20px 10px; }
                .hero__number { font-size: 56px; }
                .navbar__links { display: none; }
            }
        </style>
    </head>
    <body>

    <nav th:replace="~{fragments/navbar :: navbar(active='home')}"></nav>

<main class="page">

    <section class="hero">
        <p class="hero__label">Total Players</p>
        <h1 class="hero__number" id="total-users">—</h1>
        <p class="hero__sub">and counting</p>
    </section>

    <div class="games-container">
        <h1 class="hub-title">⚡ Available Games ⚡</h1>
        <div id="gameGrid" class="game-grid">
            <p>Scanning game database blocks...</p>
        </div>
    </div>

    <div class="grid">

        <section class="card" id="leaderboard-card">
            <h2 class="card__title">🏆 Top Players (Last 24h)</h2>
            <ol class="leaderboard" id="top-players">
                <li class="leaderboard__skeleton"></li>
                <li class="leaderboard__skeleton"></li>
                <li class="leaderboard__skeleton"></li>
            </ol>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/leaderboard" class="play-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 8px 25px;">
                    View Full Leaderboard →
                </a>
            </div>
        </section>

        <section class="card" id="achievements-card">
            <h2 class="card__title">⭐ Recent Achievements</h2>
            <ul class="achievements" id="recent-achievements">
                <li class="achievements__skeleton"></li>
                <li class="achievements__skeleton"></li>
                <li class="achievements__skeleton"></li>
            </ul>
        </section>

    </div>
</main>

<div id="gameTheaterModal" class="theater-overlay hidden">
    <div class="theater-header">
        <h2 id="theaterGameTitle" class="theater-title">Game Room</h2>
        <button class="close-theater-btn" onclick="closeGameTheater()">✕ Exit Game</button>
    </div>
    <div class="theater-body">
        <iframe id="gameIframe" src="" allowfullscreen></iframe>
    </div>
</div>

<script src="/js/navbar.js"></script>
<script src="/js/homePage.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        fetchAndRenderGames();
    });

    async function fetchAndRenderGames() {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/games', {
                method: 'GET',
                headers: {
                    'Authorization': token ? `Bearer ${token}` : '',
                    'Content-Type': 'application/json'
                }
            });

            if (!res.ok) throw new Error();

            const games = await res.json();
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';

                const isSource = game.gameType === 'OPENSOURCE';
                const badgeClass = isSource ? 'badge-source' : 'badge-home';
                const badgeText = isSource ? 'Web Arcade' : 'Custom Multiplayer';

                card.innerHTML = `
                    <div>
                        <img class="game-icon" src="${game.iconUrl}" alt="${game.title}" onerror="this.src='/img/games/default.png'">
                        <div class="game-title">${game.title}</div>
                        <span class="game-badge ${badgeClass}">${badgeText}</span>
                        <div class="game-desc">${game.description || ''}</div>
                    </div>
                    <button class="play-btn" onclick="handlePlayGame(${game.id}, '${game.gameType}', '${game.sourceUrl || ''}', '${game.title.replace(/'/g, "\\'")}')">
                        Launch Game
                    </button>
                `;
                grid.appendChild(card);
            });
        } catch (err) {
            document.getElementById('gameGrid').innerHTML = `<p style="color:#ff5599;text-align:center;">Failed to sync with game database backend.</p>`;
        }
    }

    function handlePlayGame(id, type, sourceUrl, title) {
        if (type === 'OPENSOURCE') {
            const modal = document.getElementById('gameTheaterModal');
            const iframe = document.getElementById('gameIframe');
            const titleHeader = document.getElementById('theaterGameTitle');

            titleHeader.textContent = title.toUpperCase();
            iframe.src = sourceUrl;
            modal.classList.remove('hidden');
        } else {
            alert("Initializing Custom Game Session Lobby. Checking WebSocket pipelines...");
        }
    }

    function closeGameTheater() {
        const modal = document.getElementById('gameTheaterModal');
        const iframe = document.getElementById('gameIframe');
        modal.classList.add('hidden');
        iframe.src = "";
    }
</script>
</body>
</html>
